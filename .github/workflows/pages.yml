# Build and deploy research docs (MkDocs) to GitHub Pages from the mockups branch.
# Enable: Settings → Pages → Source: GitHub Actions.

name: Deploy GitHub Pages (research site)

on:
  push:
    branches:
      - mockups
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs
        run: pip install -r requirements.txt

      # Not --strict: some agent docs link to repo paths outside docs/ (android-auto-agents, root README);
      # MkDocs cannot resolve those as internal pages. Fix links or add extra_files before re-enabling strict.
      - name: Build site
        run: mkdocs build

      # Project Pages serves at /REPO/ on both github.io and the custom domain; nest output so
      # https://sqazi.sh/PowerAmpache2PluginTemplate/ matches GitHub's redirect from github.io.
      - name: Nest site under PowerAmpache2PluginTemplate + root redirect
        run: |
          set -euo pipefail
          mkdir -p _staged
          mv site/* _staged/
          mkdir -p site/PowerAmpache2PluginTemplate
          mv _staged/* site/PowerAmpache2PluginTemplate/
          rmdir _staged
          if [ -f site/PowerAmpache2PluginTemplate/CNAME ]; then
            mv site/PowerAmpache2PluginTemplate/CNAME site/CNAME
          fi
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=PowerAmpache2PluginTemplate/">
            <link rel="canonical" href="PowerAmpache2PluginTemplate/">
            <title>Power Ampache 2 — research</title>
          </head>
          <body>
            <p><a href="PowerAmpache2PluginTemplate/">Continue to the research site</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
